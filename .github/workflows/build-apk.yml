name: Biên Dịch App Video Dịch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04 # Dùng bản hệ thống ổn định nhất
    timeout-minutes: 90
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đầy đủ phụ thuộc + SDK sẵn có
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip python3-venv libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev ncurses-dev android-sdk build-tools-common

          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Biên dịch APK
        run: |
          buildozer android clean || true
          buildozer android debug

      - name: Tải APK
        uses: actions/upload-artifact@v4
        with:
          name: APK_Video_Dich
          path: bin/*.apk
          retention-days: 30
          

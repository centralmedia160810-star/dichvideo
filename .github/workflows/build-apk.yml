name: Biên Dịch App Video Dịch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Lấy mã nguồn dự án
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt hệ thống & Buildozer
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip python3-venv libffi-dev libssl-dev autoconf automake libtool pkg-config
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Biên dịch APK
        run: buildozer android debug

      - name: Tải tệp APK kết quả
        uses: actions/upload-artifact@v4
        with:
          name: APK_Video_Dich
          path: bin/*.apk
          retention-days: 30
          

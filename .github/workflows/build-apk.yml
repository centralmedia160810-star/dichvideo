name: Biên Dịch App Video Dịch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Lấy mã nguồn dự án
        uses: actions/checkout@v4

      - name: Cài Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt phụ thuộc hệ thống
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip python3-venv libffi-dev libssl-dev autoconf automake libtool pkg-config

          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Cấu hình chấp nhận giấy phép SDK + Biên dịch
        run: |
          # Tạo thư mục SDK
          mkdir -p ~/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk

          # Tự động chấp nhận TẤT CẢ giấy phép Google
          yes | sdkmanager --licenses || true
          yes | sdkmanager --update || true

          # Xóa sạch cũ, chạy build
          buildozer android clean || true
          # Truyền biến môi trường chấp nhận giấy phép cho Buildozer
          BUILDOZER_ACCEPT_LICENSE=1 buildozer android debug
        env:
          BUILDOZER_ACCEPT_LICENSE: 1

      - name: Tải tệp APK kết quả
        uses: actions/upload-artifact@v4
        with:
          name: APK_Video_Dich
          path: bin/*.apk
          retention-days: 30
          

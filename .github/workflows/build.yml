name: Biên Dịch App Video Dịch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Chạy thủ công được

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Tăng thời gian đủ biên dịch
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Biên dịch APK
        uses: kivy/buildozer-action@v1 # Action chính thức, không cài đặt thủ công
        with:
          buildozer_args: android debug
          python_version: '3.10'
        env:
          BUILDOZER_APK_DEBUG: 1
          NDK_CCACHE: 1
          CCACHE_SIZE: 1G # Tăng bộ nhớ cho thư viện nặng

      - name: Lấy tệp APK
        uses: actions/upload-artifact@v4
        with:
          name: APK_Video_Dich
          path: bin/*.apk
          retention-days: 30
          

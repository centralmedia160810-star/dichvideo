name: Build APK Video Dịch
on: workflow_dispatch

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Lấy mã nguồn dự án
        uses: actions/checkout@v4

      - name: Cài đầy đủ phụ thuộc hệ thống
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y build-essential git zip unzip openjdk-17-jdk python3-dev python3-pip libffi-dev libssl-dev autoconf libtool pkg-config zlib1g-dev libncurses5-dev libtinfo6 cmake libsqlite3-dev bzip2 libreadline-dev libgdbm-dev liblzma-dev tk-dev libjpeg-dev zlib1g-dev libpng-dev freetype2-demos

      - name: Cài Buildozer & môi trường
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 Cython==0.29.37

      - name: Biên dịch APK
        run: |
          source venv/bin/activate
          printf "y\ny\ny\n" | buildozer android debug
          

      - name: Lưu kết quả APK
        uses: actions/upload-artifact@v4
        with:
          name: APP-VIDEO-DICH-THANHCONG
          path: bin/*.apk
          retention-days: 30

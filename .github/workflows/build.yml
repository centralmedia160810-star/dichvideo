name: Build APK Video Dịch
on: workflow_dispatch

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Lấy mã nguồn dự án
        uses: actions/checkout@v4
      - name: Cài đặt gói phụ thuộc hệ thống
        run: |
          sudo apt update -y
          sudo apt install -y zip openjdk-17-jdk python3-pip python3-venv libffi-dev libssl-dev
      - name: Cài đặt Buildozer & các thư viện cần thiết
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 Cython==0.29.37
      - name: Xây dựng tệp APK
        run: |
          source venv/bin/activate
          yes | buildozer android debug
      - name: Tải tệp APK kết quả
        uses: actions/upload-artifact@v4
        with:
          name: APP-VIDEO-DICH-HOAN-CHINH
          path: bin/*.apk
          retention-days: 30
